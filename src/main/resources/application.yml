server:
  port: 6969
spring:
  application:
    name: peleadeenanos
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5469/clubenanos_db
    username: DonDinero
    password: peleasenanos
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    sql:
      init:
        mode: always
  security:
    oauth2:
      resourceserver:
        jwt:
          # Issuer URI de Keycloak - sobreescribible via variable de entorno en Docker
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/chefs-realm}
